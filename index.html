<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>e-commerce Pura Tinta</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- HEADER -->
    <header class="header">
      <!-- PARTE SUPERIOR DEL HEADER -->
      <div class="header_top">
        <!-- Logo -->
        <!-- en la home el logo es h1 -->
        <!-- en las otras páginas el logo será p o div -->
        <h1 class="logo">
          <a href="#">
            <img
              src="http://a517.masterux.net/imagenes/logo-pura-tinta.svg"
              alt="Pura Tinta"
            />
          </a>
          <div class="dot blue"></div>
          <div class="dot olive"></div>
          <div class="dot rose"></div>
        </h1>

        <!-- Contenedor de botones LOGIN y CARRITO -->
        <div class="btns_container">
          <button class="btn_login">
            <img
              class="btn_icon"
              src="https://i.postimg.cc/HxgsJQ8G/icon-button-login.png"
              alt="icono de inicio de sesión"
            />
          </button>

          <button class="btn_shop">
            <img
              class="btn_icon"
              src="https://i.postimg.cc/Y9RkhTw6/icon-button-shop.png"
              alt="icono del carrito"
            />
          </button>
        </div>
      </div>

      <!-- NAVEGADOR -->
      <nav class="nav dotted_border_blue">
        <!-- pills -->
        <ul class="nav_list">
          <li class="nav_pill">
            <a href="#">Láminas</a>
          </li>

          <li class="nav_pill">
            <a href="#">Cuadros</a>
          </li>

          <li class="nav_pill">
            <a href="#">Fotografías</a>
          </li>

          <li class="nav_pill">
            <a href="#">Pósters</a>
          </li>

          <li class="nav_pill">
            <a href="#">Sobre nosotras</a>
          </li>

          <!-- barra de búsqueda -->
          <li>
            <form class="searching_bar_container">
              <input
                class="searching_bar"
                type="search"
                placeholder="Buscar..."
              />
              <button type="submit">
                <img
                  class="btn_icon searching_icon"
                  src="https://i.postimg.cc/g06HcP81/icon-Magnifying-Glass.png"
                  alt="icono de lente de búsqueda"
                />
              </button>
            </form>
          </li>
        </ul>
      </nav>
    </header>

    <main>

            <!-- HERO -->
      <section class="hero_section">
        <!-- container hero texto -->
        <div class="hero_text_container">
          <div class="hero_text">
            <h2 class="hero_title">
              <span class="underlined">EDICIÓN LIMITADA</span>
              Summer Vibes
            </h2>
            <p class="hero_artist_name">Eynon Jones</p>
            <p class="hero_description">
              Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do
              eiusmod tempor incididunt ut labore et dolore magna aliqua.
            </p>
          </div>

          <!-- este enlace con apariencia de BOTÓN lleva a la FICHA DE PRODUCTO -->
          <a href="#" class="btn_primary">Descubrir</a>
        </div>

        <!-- container hero imagen -->
        <!-- la imagen de la hero está definida como <img> y no como background-image en css ya que es el producto que queremos vender y nos interesa que se lea el “alt” si no se mostra la imagen  -->
        <div class="hero_image">
          <img
            src="http://a517.masterux.net/imagenes/productos/lamina-summer-vibes-eynon-jones.png"
            alt="lámina Summer Vibes de Eynon Jones de edición limitada"
          />
        </div>
      </section>


    </main>
  </body>
</html>
